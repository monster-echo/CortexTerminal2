name: Test ASC API whatsNew

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test ASC API permissions
        env:
          ISSUER_ID: ${{ secrets.CORTEX_APPSTORE_ISSUER_ID }}
          KEY_ID: ${{ secrets.CORTEX_APPSTORE_API_KEY_ID }}
          PRIVATE_KEY: ${{ secrets.CORTEX_APPSTORE_API_PRIVATE_KEY }}
        run: bash scripts/test_asc_whatsnew.sh "$ISSUER_ID" "$KEY_ID" "$PRIVATE_KEY"
