name: Test ASC API whatsNew

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test ASC API permissions
        env:
          ISSUER_ID: ${{ secrets.CORTEX_APPSTORE_ISSUER_ID }}
          KEY_ID: ${{ secrets.CORTEX_APPSTORE_API_KEY_ID }}
        run: |
          set -euo pipefail
          cat > /tmp/key.p8 <<'KEYEOF'
          ${{ secrets.CORTEX_APPSTORE_API_PRIVATE_KEY }}
          KEYEOF
          
          pip3 install --quiet jwt PyJWT cryptography 2>/dev/null || pip install --quiet jwt PyJWT cryptography 2>/dev/null || true
          
          python3 <<'PYEOF'
          import jwt, time, json
          
          with open('/tmp/key.p8') as f:
              private_key = f.read()
          
          now = int(time.time())
          payload = {
              'iss': '${{ secrets.CORTEX_APPSTORE_ISSUER_ID }}',
              'iat': now,
              'exp': now + 600,
              'aud': 'appstoreconnect-v1'
          }
          headers = {
              'alg': 'ES256',
              'kid': '${{ secrets.CORTEX_APPSTORE_API_KEY_ID }}',
              'typ': 'JWT'
          }
          token = jwt.encode(payload, private_key, algorithm='ES256', headers=headers)
          print(f'JWT: {token[:50]}...{token[-20:]}')
          
          import urllib.request
          url = 'https://api.appstoreconnect.apple.com/v1/apps?filter%5BbundleId%5D=top.rwecho.cortexterminal&limit=1'
          req = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
          try:
              resp = urllib.request.urlopen(req)
              print(f'HTTP: {resp.status}')
              print(resp.read().decode()[:300])
          except urllib.error.HTTPError as e:
              print(f'HTTP: {e.code}')
              print(e.read().decode()[:300])
          PYEOF