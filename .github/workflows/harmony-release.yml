name: HarmonyOS Release

on:
  push:
    tags: ['harmony-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '0.0.0'

permissions:
  contents: write

jobs:
  build-harmony:
    name: Build HarmonyOS App
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" == harmony-v* ]]; then
            VERSION="${GITHUB_REF_NAME#harmony-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BASE_BUILD=$(( MAJOR * 100000 + MINOR * 1000 + PATCH ))
          VERSION_CODE="${BASE_BUILD}${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Update version in app.json5
        run: |
          cd src/Harmony
          sed -i '' \
            -e "s/\"versionCode\": [0-9]*/\"versionCode\": ${{ steps.version.outputs.version_code }}/" \
            -e "s/\"versionName\": \"[^\"]*\"/\"versionName\": \"${{ steps.version.outputs.version }}\"/" \
            AppScope/app.json5

      - name: Prepare signing materials
        run: |
          echo "${{ secrets.HARMONY_KEYSTORE_P12 }}" | base64 -d > /tmp/cortex-release.p12
          echo "${{ secrets.HARMONY_CERTIFICATE_CER }}" | base64 -d > /tmp/cortex-release.cer
          echo "${{ secrets.HARMONY_PROFILE_P7B }}" | base64 -d > /tmp/cortex-release.p7b

      - name: Setup oh_modules symlinks
        run: |
          cd src/Harmony
          mkdir -p product/entry/oh_modules/@rwecho
          ln -sfn "$PWD/common/core" product/entry/oh_modules/@rwecho/core
          ln -sfn "$PWD/feature/auth" product/entry/oh_modules/@rwecho/auth
          ln -sfn "$PWD/feature/session" product/entry/oh_modules/@rwecho/session
          ln -sfn "$PWD/feature/terminal" product/entry/oh_modules/@rwecho/terminal
          ln -sfn "$PWD/feature/worker" product/entry/oh_modules/@rwecho/worker
          ln -sfn "$PWD/feature/settings" product/entry/oh_modules/@rwecho/settings
          ln -sfn "$PWD/common/routermodule" product/entry/oh_modules/routermodule
          for mod in auth terminal worker settings session; do
            mkdir -p feature/$mod/oh_modules/@rwecho
            ln -sfn "$PWD/common/core" feature/$mod/oh_modules/@rwecho/core
            ln -sfn "$PWD/common/routermodule" feature/$mod/oh_modules/routermodule
          done
          ln -sfn "$PWD/common/signalr" feature/terminal/oh_modules/@rwecho/signalr

      - name: Build unsigned HAP
        run: |
          cd src/Harmony
          chmod +x hvigorw
          ./hvigorw clean --no-daemon
          ./hvigorw assembleHap --mode module -p product=default --no-daemon

      - name: Sign HAP with release certificate
        env:
          KEYSTORE_PASS: ${{ secrets.HARMONY_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.HARMONY_KEY_PASSWORD }}
        run: |
          HAP_FILE=$(ls src/Harmony/product/entry/build/default/outputs/default/entry-default-unsigned.hap | head -1)
          java -jar "/Applications/DevEco-Studio.app/Contents/sdk/default/openharmony/toolchains/lib/hap-sign-tool.jar" sign-app \
            -mode localSign \
            -keyAlias "${{ secrets.HARMONY_KEY_ALIAS }}" \
            -keyPwd "$KEY_PASS" \
            -appCertFile /tmp/cortex-release.cer \
            -profileFile /tmp/cortex-release.p7b \
            -inFile "$HAP_FILE" \
            -signAlg SHA256withECDSA \
            -keystoreFile /tmp/cortex-release.p12 \
            -keystorePwd "$KEYSTORE_PASS" \
            -outFile /tmp/entry-release-signed.hap \
            -compatibleVersion 12 \
            -signCode 1

      - name: Package .app
        run: |
          UNPACK_DIR=$(mktemp -d)
          cp /tmp/entry-release-signed.hap "$UNPACK_DIR/entry-default.hap"
          cd src/Harmony
          APP=$(ls build/outputs/*/Harmony-*.app build/outputs/*/*/Harmony-*.app 2>/dev/null | head -1) || true
          if [ -f "$APP" ]; then
            unzip -o "$APP" -d "$UNPACK_DIR"
          else
            echo '{"app":{"bundleName":"top.rwecho.cortexterminal","version":{"code":${{ steps.version.outputs.version_code }},"name":"${{ steps.version.outputs.version }}"}}}' > "$UNPACK_DIR/pac.json"
            echo '{"packages":[{"name":"entry-default","type":"hap","moduleType":"entry","deviceType":["default","tablet"],"deliveryWithInstall":true}]}' > "$UNPACK_DIR/pack.info"
          fi
          cd "$UNPACK_DIR"
          zip -j /tmp/cortexterminal-${{ steps.version.outputs.version }}.app pac.json pack.info entry-default.hap
          cp /tmp/cortexterminal-${{ steps.version.outputs.version }}.app /tmp/cortexterminal-${{ steps.version.outputs.version }}.zip

      - name: Upload artifact for publish job
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: /tmp/cortexterminal-${{ steps.version.outputs.version }}.app
          retention-days: 1

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/cortexterminal-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-appgallery:
    name: Publish to AppGallery Connect
    needs: build-harmony
    runs-on: self-hosted
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: /tmp

      - name: Get AGConnect Access Token (Service Account JWT)
        id: auth
        env:
          AGC_SERVICE_ACCOUNT_KEY: ${{ secrets.AGC_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$AGC_SERVICE_ACCOUNT_KEY" > /tmp/agc-key.json
          jq -r '.private_key' /tmp/agc-key.json > /tmp/agc-private.pem

          KEY_ID=$(jq -r '.key_id' /tmp/agc-key.json)
          SUB_ACCOUNT=$(jq -r '.sub_account' /tmp/agc-key.json)
          TOKEN_URI=$(jq -r '.token_uri' /tmp/agc-key.json)

          NOW=$(date +%s)
          EXP=$((NOW + 3600))

          HEADER=$(printf '{"alg":"RS256","typ":"JWT","kid":"%s"}' "$KEY_ID" | base64 | tr '+/' '-_' | tr -d '=\n')
          PAYLOAD=$(printf '{"iss":"%s","sub":"%s","aud":"%s","iat":%d,"exp":%d}' "$SUB_ACCOUNT" "$SUB_ACCOUNT" "$TOKEN_URI" "$NOW" "$EXP" | base64 | tr '+/' '-_' | tr -d '=\n')
          SIGNATURE=$(printf '%s.%s' "$HEADER" "$PAYLOAD" | openssl dgst -binary -sha256 -sign /tmp/agc-private.pem | base64 | tr '+/' '-_' | tr -d '=\n')

          JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"

          RESPONSE=$(curl -s -X POST "$TOKEN_URI" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${JWT}")

          echo "::group::Token response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to get access token: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

          rm -f /tmp/agc-key.json /tmp/agc-private.pem

      - name: Get Upload URL
        id: upload-url
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "https://connect-api.cloud.huawei.com/publish/v2/upload-url?appId=${{ secrets.AGC_APP_ID }}&suffix=app" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "::group::Upload URL response (HTTP $HTTP_CODE)"
          echo "$BODY"
          echo "::endgroup::"
          UPLOAD_URL=$(echo "$BODY" | jq -r '.url // .data.url' 2>/dev/null || echo "")
          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "::error::Failed to get upload URL (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "upload_url=$UPLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "$BODY" > /tmp/upload-url-response.json

      - name: Upload APP file to AppGallery
        id: upload-file
        run: |
          APP_FILE=$(ls /tmp/cortexterminal-*.app | head -1)
          UPLOAD_URL=$(jq -r '.url // .data.url' /tmp/upload-url-response.json)
          AUTH_CODE=$(jq -r '.authCode // .data.authCode // .data.auth_code' /tmp/upload-url-response.json)

          RESPONSE=$(curl -s -X PUT "$UPLOAD_URL" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}" \
            -F "file=@$APP_FILE" \
            -F "auth_code=$AUTH_CODE")
          echo "::group::Upload response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          FILE_CONTENT=$(echo "$RESPONSE" | jq -r '.fileContent // .data.fileContent')
          if [ -z "$FILE_CONTENT" ] || [ "$FILE_CONTENT" = "null" ]; then
            echo "::error::File upload failed: $RESPONSE"
            exit 1
          fi
          echo "file_content=$FILE_CONTENT" >> "$GITHUB_OUTPUT"

      - name: Update App File Info
        run: |
          RESPONSE=$(curl -s -X PUT \
            "https://connect-api.cloud.huawei.com/publish/v3/app-info?appId=${{ secrets.AGC_APP_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}" \
            -H "Content-Type: application/json" \
            -d "{\"lang\":\"zh-CN\",\"fileContents\":[{\"fileName\":\"app\",\"fileContent\":\"${{ steps.upload-file.outputs.file_content }}\"}]}")
          echo "::group::Update app info response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          RET=$(echo "$RESPONSE" | jq -r '.ret.code // .code // .data // "unknown"')
          if [ "$RET" != "0" ]; then
            echo "::error::Update app info failed: $RESPONSE"
            exit 1
          fi

      - name: Wait for package parsing
        run: sleep 120

      - name: Query compile status
        run: |
          for i in $(seq 1 20); do
            RESPONSE=$(curl -s -X GET \
              "https://connect-api.cloud.huawei.com/publish/v2/app-compile-status?appId=${{ secrets.AGC_APP_ID }}" \
              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
              -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
            STATUS=$(echo "$RESPONSE" | jq -r '.data // .status // "unknown"')
            echo "Attempt $i: compile status = $STATUS"
            if [ "$STATUS" = "2" ] || [ "$STATUS" = "success" ]; then
              echo "Compile successful"
              exit 0
            fi
            if [ "$STATUS" = "3" ] || [ "$STATUS" = "fail" ]; then
              echo "::error::Compile failed: $RESPONSE"
              exit 1
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for compile"
          exit 1

      - name: Submit for release
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://connect-api.cloud.huawei.com/publish/v2/app-submit?appid=${{ secrets.AGC_APP_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
          echo "::group::Submit response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          RET=$(echo "$RESPONSE" | jq -r '.ret.code // .code // "unknown"')
          if [ "$RET" != "0" ]; then
            echo "::error::Submit failed: $RESPONSE"
            exit 1
          fi
          echo "App submitted to AppGallery Connect successfully!"
