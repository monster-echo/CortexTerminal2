name: HarmonyOS Release

on:
  push:
    tags: ['harmony-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '0.0.0'

permissions:
  contents: write

jobs:
  build-harmony:
    name: Build HarmonyOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup OpenHarmony SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        id: sdk
        with:
          version: '6.1'
          cache: true

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" == harmony-v* ]]; then
            VERSION="${GITHUB_REF_NAME#harmony-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION%%-*}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BASE_BUILD=$(printf "%d%03d%03d" "$MAJOR" "$MINOR" "$PATCH")
          VERSION_CODE="${BASE_BUILD}${GITHUB_RUN_NUMBER}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode release signing certificates
        id: signing
        env:
          CERT_CER: ${{ secrets.CORTEX_HARMONY_CERT_CER }}
        run: |
          if [ -z "$CERT_CER" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No CORTEX_HARMONY_CERT_CER secret found — using debug signing"
            exit 0
          fi

          SIGN_DIR=$(mktemp -d)
          printf '%s' "$CERT_CER" | base64 -D > "$SIGN_DIR/release.cer"
          printf '%s' "${{ secrets.CORTEX_HARMONY_PROFILE_P7B }}" | base64 -D > "$SIGN_DIR/release.p7b"
          printf '%s' "${{ secrets.CORTEX_HARMONY_KEYSTORE_P12 }}" | base64 -D > "$SIGN_DIR/release.p12"
          echo "dir=$SIGN_DIR" >> "$GITHUB_OUTPUT"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Inject release signing config
        if: steps.signing.outputs.enabled == 'true'
        env:
          SIGN_DIR: ${{ steps.signing.outputs.dir }}
          KEY_ALIAS: ${{ secrets.CORTEX_HARMONY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CORTEX_HARMONY_KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.CORTEX_HARMONY_KEYSTORE_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import re, os

          sign_dir = os.environ['SIGN_DIR']
          key_alias = os.environ['KEY_ALIAS']
          key_pwd = os.environ['KEY_PASSWORD']
          ks_pwd = os.environ['KEYSTORE_PASSWORD']

          with open('src/Harmony/build-profile.json5', 'r') as f:
              content = f.read()

          new_signing = f'''  "signingConfigs": [
            {{
              "name": "default",
              "type": "HarmonyOS",
              "material": {{
                "certpath": "{sign_dir}/release.cer",
                "keyAlias": "{key_alias}",
                "keyPassword": "{key_pwd}",
                "profile": "{sign_dir}/release.p7b",
                "signAlg": "SHA256withECDSA",
                "storeFile": "{sign_dir}/release.p12",
                "storePassword": "{ks_pwd}"
              }}
            }}
          ],'''

          content = re.sub(
              r'"signingConfigs"\s*:\s*\[.*?\],',
              new_signing,
              content,
              count=1,
              flags=re.DOTALL,
          )

          with open('src/Harmony/build-profile.json5', 'w') as f:
              f.write(content)
          PYEOF

      - name: Generate build files
        run: |
          cd src/Harmony

          SDK_PATH="${{ steps.sdk.outputs.ohos-base-sdk-home }}"

          cat > local.properties <<EOF
          sdk.dir=$SDK_PATH
          nodejs.dir=$(dirname $(which node))
          ohos.sdk.dir=$SDK_PATH
          hwsdk.dir=$SDK_PATH
          EOF

          cat > hvigorfile.ts <<'EOF'
          import { appTasks } from '@ohos/hvigor-ohos-plugin';
          export default {
              system: appTasks,
              plugins:[]
          }
          EOF

          cat > product/entry/hvigorfile.ts <<'EOF'
          import { hapTasks } from '@ohos/hvigor-ohos-plugin';
          export default {
              system: hapTasks,
              plugins:[]
          }
          EOF

          for dir in common/core common/signalr common/routermodule \
                     feature/auth feature/terminal feature/worker \
                     feature/settings feature/session; do
            cat > "$dir/hvigorfile.ts" <<'EOF'
          import { harTasks } from '@ohos/hvigor-ohos-plugin';
          export default {
              system: harTasks,
              plugins:[]
          }
          EOF
          done

      - name: Update version in app.json5
        run: |
          cd src/Harmony
          sed -i '' \
            -e "s/\"versionCode\": [0-9]*/\"versionCode\": ${{ steps.version.outputs.version_code }}/" \
            -e "s/\"versionName\": \"[^\"]*\"/\"versionName\": \"${{ steps.version.outputs.version }}\"/" \
            AppScope/app.json5

      - name: Setup oh_modules symlinks
        run: |
          cd src/Harmony

          # entry module
          mkdir -p product/entry/oh_modules/@rwecho
          ln -s "$PWD/common/core" product/entry/oh_modules/@rwecho/core
          ln -s "$PWD/feature/auth" product/entry/oh_modules/@rwecho/auth
          ln -s "$PWD/feature/session" product/entry/oh_modules/@rwecho/session
          ln -s "$PWD/feature/terminal" product/entry/oh_modules/@rwecho/terminal
          ln -s "$PWD/feature/worker" product/entry/oh_modules/@rwecho/worker
          ln -s "$PWD/feature/settings" product/entry/oh_modules/@rwecho/settings
          ln -s "$PWD/common/routermodule" product/entry/oh_modules/routermodule

          # feature/auth
          mkdir -p feature/auth/oh_modules/@rwecho
          ln -s "$PWD/common/core" feature/auth/oh_modules/@rwecho/core
          ln -s "$PWD/common/routermodule" feature/auth/oh_modules/routermodule

          # feature/terminal
          mkdir -p feature/terminal/oh_modules/@rwecho
          ln -s "$PWD/common/core" feature/terminal/oh_modules/@rwecho/core
          ln -s "$PWD/common/signalr" feature/terminal/oh_modules/@rwecho/signalr
          ln -s "$PWD/common/routermodule" feature/terminal/oh_modules/routermodule

          # feature/worker
          mkdir -p feature/worker/oh_modules/@rwecho
          ln -s "$PWD/common/core" feature/worker/oh_modules/@rwecho/core
          ln -s "$PWD/common/routermodule" feature/worker/oh_modules/routermodule

          # feature/settings
          mkdir -p feature/settings/oh_modules/@rwecho
          ln -s "$PWD/common/core" feature/settings/oh_modules/@rwecho/core
          ln -s "$PWD/common/routermodule" feature/settings/oh_modules/routermodule

          # feature/session
          mkdir -p feature/session/oh_modules/@rwecho
          ln -s "$PWD/common/core" feature/session/oh_modules/@rwecho/core
          ln -s "$PWD/common/routermodule" feature/session/oh_modules/routermodule

      - name: Install hvigor
        run: |
          npm config set @ohos:registry=https://repo.harmonyos.com/npm/
          cd src/Harmony
          npm install @ohos/hvigor @ohos/hvigor-ohos-plugin

      - name: Build .app
        run: |
          cd src/Harmony
          # Use the hvigor binary installed by npm from Huawei registry
          HVIGOR_BIN=$(find node_modules/.bin -name 'hvigor*' | head -1)
          if [ -z "$HVIGOR_BIN" ]; then
            echo "::error::hvigor binary not found in node_modules/.bin"
            ls node_modules/.bin/ 2>/dev/null || echo "no .bin directory"
            exit 1
          fi
          echo "Using hvigor: $HVIGOR_BIN"
          NODE_PATH="$PWD/node_modules" "$HVIGOR_BIN" assembleApp --mode module -p product=default -p buildMode=release --no-daemon

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src/Harmony/product/entry/build/default/outputs/default/*-signed.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup signing files
        if: always() && steps.signing.outputs.enabled == 'true'
        run: rm -rf "${{ steps.signing.outputs.dir }}"
