name: HarmonyOS Release

on:
  push:
    tags: ['harmony-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '0.0.0'

permissions:
  contents: write

jobs:
  build-harmony:
    name: Build HarmonyOS App
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" == harmony-v* ]]; then
            VERSION="${GITHUB_REF_NAME#harmony-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION%%-*}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BASE_BUILD=$(( MAJOR * 100000 + MINOR * 1000 + PATCH ))
          VERSION_CODE="${BASE_BUILD}${GITHUB_RUN_NUMBER}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Update version in app.json5
        run: |
          cd src/Harmony
          sed -i '' \
            -e "s/\"versionCode\": [0-9]*/\"versionCode\": ${{ steps.version.outputs.version_code }}/" \
            -e "s/\"versionName\": \"[^\"]*\"/\"versionName\": \"${{ steps.version.outputs.version }}\"/" \
            AppScope/app.json5

      - name: Setup oh_modules symlinks
        run: |
          cd src/Harmony

          mkdir -p product/entry/oh_modules/@rwecho
          ln -sfn "$PWD/common/core" product/entry/oh_modules/@rwecho/core
          ln -sfn "$PWD/feature/auth" product/entry/oh_modules/@rwecho/auth
          ln -sfn "$PWD/feature/session" product/entry/oh_modules/@rwecho/session
          ln -sfn "$PWD/feature/terminal" product/entry/oh_modules/@rwecho/terminal
          ln -sfn "$PWD/feature/worker" product/entry/oh_modules/@rwecho/worker
          ln -sfn "$PWD/feature/settings" product/entry/oh_modules/@rwecho/settings
          ln -sfn "$PWD/common/routermodule" product/entry/oh_modules/routermodule

          for mod in auth terminal worker settings session; do
            mkdir -p feature/$mod/oh_modules/@rwecho
            ln -sfn "$PWD/common/core" feature/$mod/oh_modules/@rwecho/core
            ln -sfn "$PWD/common/routermodule" feature/$mod/oh_modules/routermodule
          done

          ln -sfn "$PWD/common/signalr" feature/terminal/oh_modules/@rwecho/signalr

      - name: Setup signing materials
        env:
          KEYSTORE_BASE64: ${{ secrets.HARMONY_KEYSTORE_P12 }}
          CERT_BASE64: ${{ secrets.HARMONY_CERTIFICATE_CER }}
          PROFILE_BASE64: ${{ secrets.HARMONY_PROFILE_P7B }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/cortex-release.p12
          echo "$CERT_BASE64" | base64 -d > /tmp/cortex-release.cer
          echo "$PROFILE_BASE64" | base64 -d > /tmp/cortex-release.p7b

      - name: Build unsigned HAP
        run: |
          cd src/Harmony
          chmod +x hvigorw
          ./hvigorw assembleHap --mode module -p product=default --no-daemon

      - name: Sign HAP with release certificate
        env:
          KEYSTORE_PASS: ${{ secrets.HARMONY_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.HARMONY_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.HARMONY_KEY_ALIAS }}
        run: |
          HAP_FILE=$(ls src/Harmony/product/entry/build/default/outputs/default/entry-default-unsigned.hap | head -1)

          java -jar "$DEVECO_SDK_HOME/default/openharmony/toolchains/lib/hap-sign-tool.jar" sign-app \
            -mode localSign \
            -keyAlias "$KEY_ALIAS" \
            -keyPwd "$KEY_PASS" \
            -appCertFile /tmp/cortex-release.cer \
            -profileFile /tmp/cortex-release.p7b \
            -inFile "$HAP_FILE" \
            -signAlg SHA256withECDSA \
            -keystoreFile /tmp/cortex-release.p12 \
            -keystorePwd "$KEYSTORE_PASS" \
            -outFile src/Harmony/product/entry/build/default/outputs/default/entry-release-signed.hap \
            -compatibleVersion 12 \
            -signCode 1

          # Package into .app
          UNPACK_DIR=$(mktemp -d)
          UNSIGNED_APP=$(ls src/Harmony/build/outputs/default/Harmony-default-unsigned.app 2>/dev/null | head -1)
          if [ -f "$UNSIGNED_APP" ]; then
            unzip -o "$UNSIGNED_APP" -d "$UNPACK_DIR"
            cp src/Harmony/product/entry/build/default/outputs/default/entry-release-signed.hap "$UNPACK_DIR/entry-default.hap"
            cd "$UNPACK_DIR"
            zip -j /tmp/cortexterminal-release.app pac.json pack.info entry-default.hap
          else
            echo "WARNING: unsigned .app not found, using HAP only"
            cp src/Harmony/product/entry/build/default/outputs/default/entry-release-signed.hap /tmp/cortexterminal-release.app
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/cortexterminal-release.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
