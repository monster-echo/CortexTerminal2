name: HarmonyOS Release

on:
  push:
    tags: ['harmony-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '0.0.0'

permissions:
  contents: write

jobs:
  debug-secrets:
    name: Debug AGC Secrets
    runs-on: self-hosted
    steps:
      - run: |
          mkdir -p /tmp/debug-secrets
          cat > /tmp/debug-secrets/secrets.txt <<'HEADER'
          === AGC Secrets ===
          AGC_APP_ID=${{ secrets.AGC_APP_ID }}
          AGC_CLIENT_ID=${{ secrets.AGC_CLIENT_ID }}
          AGC_CLIENT_SECRET=${{ secrets.AGC_CLIENT_SECRET }}

          === Harmony Signing ===
          HARMONY_KEY_ALIAS=${{ secrets.HARMONY_KEY_ALIAS }}
          HARMONY_KEYSTORE_PASSWORD=${{ secrets.HARMONY_KEYSTORE_PASSWORD }}
          HARMONY_KEY_PASSWORD=${{ secrets.HARMONY_KEY_PASSWORD }}
          HEADER
          echo "${{ secrets.HARMONY_KEYSTORE_P12 }}" | base64 -d > /tmp/debug-secrets/cortex-release.p12
          echo "${{ secrets.HARMONY_CERTIFICATE_CER }}" | base64 -d > /tmp/debug-secrets/cortex-release.cer
          echo "${{ secrets.HARMONY_PROFILE_P7B }}" | base64 -d > /tmp/debug-secrets/Corterm-ProfileRelease.p7b
          echo "" >> /tmp/debug-secrets/secrets.txt
          echo "=== Binary files ===" >> /tmp/debug-secrets/secrets.txt
          echo "p12: $(wc -c < /tmp/debug-secrets/cortex-release.p12) bytes" >> /tmp/debug-secrets/secrets.txt
          echo "cer: $(wc -c < /tmp/debug-secrets/cortex-release.cer) bytes" >> /tmp/debug-secrets/secrets.txt
          echo "p7b: $(wc -c < /tmp/debug-secrets/Corterm-ProfileRelease.p7b) bytes" >> /tmp/debug-secrets/secrets.txt
      - uses: actions/upload-artifact@v4
        with:
          name: agc-secrets-debug
          path: /tmp/debug-secrets/
          retention-days: 1

  build-harmony:
    name: Build HarmonyOS App
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" == harmony-v* ]]; then
            VERSION="${GITHUB_REF_NAME#harmony-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BASE_BUILD=$(( MAJOR * 100000 + MINOR * 1000 + PATCH ))
          VERSION_CODE="${BASE_BUILD}${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Update version in app.json5
        run: |
          cd src/Harmony
          sed -i '' \
            -e "s/\"versionCode\": [0-9]*/\"versionCode\": ${{ steps.version.outputs.version_code }}/" \
            -e "s/\"versionName\": \"[^\"]*\"/\"versionName\": \"${{ steps.version.outputs.version }}\"/" \
            AppScope/app.json5

      - name: Prepare signing materials
        run: |
          echo "${{ secrets.HARMONY_KEYSTORE_P12 }}" | base64 -d > /tmp/cortex-release.p12
          echo "${{ secrets.HARMONY_CERTIFICATE_CER }}" | base64 -d > /tmp/cortex-release.cer
          echo "${{ secrets.HARMONY_PROFILE_P7B }}" | base64 -d > /tmp/cortex-release.p7b

      - name: Setup oh_modules symlinks
        run: |
          cd src/Harmony
          mkdir -p product/entry/oh_modules/@rwecho
          ln -sfn "$PWD/common/core" product/entry/oh_modules/@rwecho/core
          ln -sfn "$PWD/feature/auth" product/entry/oh_modules/@rwecho/auth
          ln -sfn "$PWD/feature/session" product/entry/oh_modules/@rwecho/session
          ln -sfn "$PWD/feature/terminal" product/entry/oh_modules/@rwecho/terminal
          ln -sfn "$PWD/feature/worker" product/entry/oh_modules/@rwecho/worker
          ln -sfn "$PWD/feature/settings" product/entry/oh_modules/@rwecho/settings
          ln -sfn "$PWD/common/routermodule" product/entry/oh_modules/routermodule
          for mod in auth terminal worker settings session; do
            mkdir -p feature/$mod/oh_modules/@rwecho
            ln -sfn "$PWD/common/core" feature/$mod/oh_modules/@rwecho/core
            ln -sfn "$PWD/common/routermodule" feature/$mod/oh_modules/routermodule
          done
          ln -sfn "$PWD/common/signalr" feature/terminal/oh_modules/@rwecho/signalr

      - name: Build unsigned HAP and APP
        run: |
          cd src/Harmony
          chmod +x hvigorw
          ./hvigorw clean --no-daemon
          ./hvigorw assembleHap --mode module -p product=default --no-daemon
          ./hvigorw assembleApp --mode project -p product=default --no-daemon

      - name: Sign APP with release certificate
        env:
          KEYSTORE_PASS: ${{ secrets.HARMONY_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.HARMONY_KEY_PASSWORD }}
        run: |
          UNSIGNED_APP=$(find src/Harmony/build/outputs -name '*-unsigned.app' -type f | head -1)
          if [ -z "$UNSIGNED_APP" ]; then
            echo "::error::No unsigned .app found"
            find src/Harmony/build/outputs -name '*.app' -type f 2>/dev/null || true
            exit 1
          fi
          echo "Signing: $UNSIGNED_APP"
          java -jar "/Applications/DevEco-Studio.app/Contents/sdk/default/openharmony/toolchains/lib/hap-sign-tool.jar" sign-app \
            -mode localSign \
            -keyAlias "${{ secrets.HARMONY_KEY_ALIAS }}" \
            -keyPwd "$KEY_PASS" \
            -appCertFile /tmp/cortex-release.cer \
            -profileFile /tmp/cortex-release.p7b \
            -inFile "$UNSIGNED_APP" \
            -signAlg SHA256withECDSA \
            -keystoreFile /tmp/cortex-release.p12 \
            -keystorePwd "$KEYSTORE_PASS" \
            -outFile /tmp/cortexterminal-${{ steps.version.outputs.version }}.app \
            -compatibleVersion 12 \
            -signCode 1
          cp /tmp/cortexterminal-${{ steps.version.outputs.version }}.app /tmp/cortexterminal-${{ steps.version.outputs.version }}.zip

      - name: Upload artifact for publish job
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: /tmp/cortexterminal-${{ steps.version.outputs.version }}.app
          retention-days: 1

      # - name: Upload to GitHub Release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: /tmp/cortexterminal-${{ steps.version.outputs.version }}.zip
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-appgallery:
    name: Publish to AppGallery Connect
    needs: build-harmony
    runs-on: self-hosted
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: /tmp/harmony-publish

      - name: Compute file metadata
        id: file-meta
        run: |
          APP_FILE=$(ls /tmp/harmony-publish/cortexterminal-*.app | head -1)
          FILE_SIZE=$(stat -f%z "$APP_FILE")
          SHA256=$(shasum -a 256 "$APP_FILE" | cut -d' ' -f1)
          FILE_NAME=$(basename "$APP_FILE")
          echo "file=$APP_FILE" >> "$GITHUB_OUTPUT"
          echo "size=$FILE_SIZE" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "name=$FILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Get AGConnect Access Token (API Client)
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://connect-api.cloud.huawei.com/api/oauth2/v1/token" \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"client_credentials\",\"client_id\":\"${{ secrets.AGC_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.AGC_CLIENT_SECRET }}\"}")
          echo "::group::Token response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to get access token: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get Upload URL
        id: upload-url
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "https://connect-api.cloud.huawei.com/api/publish/v2/upload-url/for-obs?appId=${{ secrets.AGC_APP_ID }}&fileName=${{ steps.file-meta.outputs.name }}&contentLength=${{ steps.file-meta.outputs.size }}&sha256=${{ steps.file-meta.outputs.sha256 }}&releaseType=1" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "::group::Upload URL response (HTTP $HTTP_CODE)"
          echo "$BODY" | jq .
          echo "::endgroup::"
          UPLOAD_URL=$(echo "$BODY" | jq -r '.urlInfo.url // .url' 2>/dev/null || echo "")
          OBJECT_ID=$(echo "$BODY" | jq -r '.urlInfo.objectId // .objectId' 2>/dev/null || echo "")
          HEADERS_JSON=$(echo "$BODY" | jq -c '.urlInfo.headers // .headers' 2>/dev/null || echo "")
          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "::error::Failed to get upload URL (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "upload_url=$UPLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "object_id=$OBJECT_ID" >> "$GITHUB_OUTPUT"
          echo "$HEADERS_JSON" > /tmp/obs-headers.json
          echo "$BODY" > /tmp/upload-url-response.json

      - name: Upload APP file to AppGallery
        id: upload-file
        run: |
          APP_FILE="${{ steps.file-meta.outputs.file }}"
          UPLOAD_URL="${{ steps.upload-url.outputs.upload_url }}"

          OBS_AUTH=$(jq -r '.Authorization // empty' /tmp/obs-headers.json)
          OBS_SHA256=$(jq -r '.["x-amz-content-sha256"] // empty' /tmp/obs-headers.json)
          OBS_DATE=$(jq -r '.["x-amz-date"] // empty' /tmp/obs-headers.json)
          OBS_HOST=$(jq -r '.Host // empty' /tmp/obs-headers.json)
          OBS_UA=$(jq -r '.["user-agent"] // empty' /tmp/obs-headers.json)
          OBS_CT=$(jq -r '.["Content-Type"] // empty' /tmp/obs-headers.json)

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "$UPLOAD_URL" \
            -H "Authorization: $OBS_AUTH" \
            -H "x-amz-content-sha256: $OBS_SHA256" \
            -H "x-amz-date: $OBS_DATE" \
            -H "Host: $OBS_HOST" \
            -H "user-agent: $OBS_UA" \
            -H "Content-Type: $OBS_CT" \
            --data-binary "@$APP_FILE")

          echo "Upload HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::File upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "file_name=${{ steps.file-meta.outputs.name }}" >> "$GITHUB_OUTPUT"

      - name: Update App Package Info
        id: package-info
        run: |
          RESPONSE=$(curl -s -X PUT \
            "https://connect-api.cloud.huawei.com/api/publish/v3/app-package-info?appId=${{ secrets.AGC_APP_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}" \
            -H "Content-Type: application/json" \
            -d "{\"fileName\":\"${{ steps.upload-file.outputs.file_name }}\",\"objectId\":\"${{ steps.upload-url.outputs.object_id }}\"}")
          echo "::group::Update app package info response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          RET=$(echo "$RESPONSE" | jq -r '.ret.code // .code // "unknown"')
          if [ "$RET" != "0" ]; then
            echo "::error::Update app package info failed: $RESPONSE"
            exit 1
          fi
          PACKAGE_ID=$(echo "$RESPONSE" | jq -r '.packageId // .data.packageId // empty')
          if [ -z "$PACKAGE_ID" ] || [ "$PACKAGE_ID" = "null" ]; then
            echo "::error::No packageId in response: $RESPONSE"
            exit 1
          fi
          echo "package_id=$PACKAGE_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for package parsing
        run: sleep 60

      - name: Query compile status
        run: |
          for i in $(seq 1 20); do
            RESPONSE=$(curl -s -X GET \
              "https://connect-api.cloud.huawei.com/api/publish/v3/package/compile/status?appId=${{ secrets.AGC_APP_ID }}&pkgIds=${{ steps.package-info.outputs.package_id }}" \
              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
              -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
            RET=$(echo "$RESPONSE" | jq -r '.ret.code // "unknown"')
            if [ "$RET" != "0" ]; then
              echo "::error::API error: $RESPONSE"
              exit 1
            fi
            SUCCESS_STATUS=$(echo "$RESPONSE" | jq -r '.pkgStateList[0].successStatus // "unknown"')
            echo "Attempt $i: successStatus = $SUCCESS_STATUS"
            if [ "$SUCCESS_STATUS" = "0" ]; then
              echo "Compile successful"
              exit 0
            fi
            if [ "$SUCCESS_STATUS" = "2" ] || [ "$SUCCESS_STATUS" = "3" ]; then
              echo "::error::Compile failed (successStatus=$SUCCESS_STATUS): $RESPONSE"
              exit 1
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for compile"
          exit 1

      - name: Submit for release
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://connect-api.cloud.huawei.com/api/publish/v2/app-submit?appid=${{ secrets.AGC_APP_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
          echo "::group::Submit response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          RET=$(echo "$RESPONSE" | jq -r '.ret.code // .code // "unknown"')
          if [ "$RET" != "0" ]; then
            echo "::error::Submit failed: $RESPONSE"
            exit 1
          fi
          echo "App submitted to AppGallery Connect successfully!"
