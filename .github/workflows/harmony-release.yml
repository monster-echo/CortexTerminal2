name: HarmonyOS Release

on:
  push:
    tags: ['harmony-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '0.0.0'

permissions:
  contents: write

jobs:
  build-harmony:
    name: Build HarmonyOS App
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" == harmony-v* ]]; then
            VERSION="${GITHUB_REF_NAME#harmony-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BASE_BUILD=$(( MAJOR * 100000 + MINOR * 1000 + PATCH ))
          VERSION_CODE="${BASE_BUILD}${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Update version in app.json5
        run: |
          cd src/Harmony
          sed -i '' \
            -e "s/\"versionCode\": [0-9]*/\"versionCode\": ${{ steps.version.outputs.version_code }}/" \
            -e "s/\"versionName\": \"[^\"]*\"/\"versionName\": \"${{ steps.version.outputs.version }}\"/" \
            AppScope/app.json5

      - name: Prepare signing materials
        run: |
          echo "${{ secrets.HARMONY_KEYSTORE_P12 }}" | base64 -d > /tmp/cortex-release.p12
          echo "${{ secrets.HARMONY_CERTIFICATE_CER }}" | base64 -d > /tmp/cortex-release.cer
          echo "${{ secrets.HARMONY_PROFILE_P7B }}" | base64 -d > /tmp/cortex-release.p7b

      - name: Configure release signing in build-profile
        run: |
          cd src/Harmony
          python3 -c "
          import json
          with open('build-profile.json5', 'r') as f:
              cfg = json.load(f)
          for sc in cfg['app']['signingConfigs']:
              if sc['name'] == 'release':
                  sc['material']['certpath'] = '/tmp/cortex-release.cer'
                  sc['material']['profile'] = '/tmp/cortex-release.p7b'
                  sc['material']['storeFile'] = '/tmp/cortex-release.p12'
                  sc['material']['keyAlias'] = '${{ secrets.HARMONY_KEY_ALIAS }}'
                  sc['material']['keyPassword'] = '${{ secrets.HARMONY_KEY_PASSWORD }}'
                  sc['material']['storePassword'] = '${{ secrets.HARMONY_KEYSTORE_PASSWORD }}'
                  break
          with open('build-profile.json5', 'w') as f:
              json.dump(cfg, f, indent=2)
          "
          echo "=== Release signing config ==="
          python3 -c "
          import json
          with open('build-profile.json5') as f:
              cfg = json.load(f)
          for sc in cfg['app']['signingConfigs']:
              if sc['name'] == 'release':
                  m = sc['material']
                  print(f'  certpath: {m[\"certpath\"]}')
                  print(f'  profile: {m[\"profile\"]}')
                  print(f'  storeFile: {m[\"storeFile\"]}')
                  print(f'  keyAlias: {m[\"keyAlias\"]}')
                  print(f'  keyPassword: ***')
                  print(f'  storePassword: ***')
          "

      - name: Setup oh_modules symlinks
        run: |
          cd src/Harmony
          mkdir -p product/entry/oh_modules/@rwecho
          ln -sfn "$PWD/common/core" product/entry/oh_modules/@rwecho/core
          ln -sfn "$PWD/feature/auth" product/entry/oh_modules/@rwecho/auth
          ln -sfn "$PWD/feature/session" product/entry/oh_modules/@rwecho/session
          ln -sfn "$PWD/feature/terminal" product/entry/oh_modules/@rwecho/terminal
          ln -sfn "$PWD/feature/worker" product/entry/oh_modules/@rwecho/worker
          ln -sfn "$PWD/feature/settings" product/entry/oh_modules/@rwecho/settings
          ln -sfn "$PWD/common/routermodule" product/entry/oh_modules/routermodule
          for mod in auth terminal worker settings session; do
            mkdir -p feature/$mod/oh_modules/@rwecho
            ln -sfn "$PWD/common/core" feature/$mod/oh_modules/@rwecho/core
            ln -sfn "$PWD/common/routermodule" feature/$mod/oh_modules/routermodule
          done
          ln -sfn "$PWD/common/signalr" feature/terminal/oh_modules/@rwecho/signalr

      - name: Build signed APP bundle
        run: |
          cd src/Harmony
          chmod +x hvigorw
          ./hvigorw clean --no-daemon
          ./hvigorw assembleApp --mode project -p product=release --no-daemon

      - name: Locate and prepare .app
        run: |
          APP_FILE=$(find src/Harmony/build/outputs -name '*.app' -type f | head -1)
          if [ -z "$APP_FILE" ]; then
            echo "::error::No .app file found in build outputs"
            find src/Harmony/build/outputs -type f 2>/dev/null || true
            exit 1
          fi
          echo "Found APP: $APP_FILE"
          cp "$APP_FILE" /tmp/cortexterminal-${{ steps.version.outputs.version }}.app
          cp "$APP_FILE" /tmp/cortexterminal-${{ steps.version.outputs.version }}.zip

      - name: Upload artifact for publish job
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: /tmp/cortexterminal-${{ steps.version.outputs.version }}.app
          retention-days: 1

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/cortexterminal-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-appgallery:
    name: Publish to AppGallery Connect
    needs: build-harmony
    runs-on: self-hosted
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: /tmp

      - name: Get AGConnect Access Token (API Client)
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://connect-api.cloud.huawei.com/api/oauth2/v1/token" \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"client_credentials\",\"client_id\":\"${{ secrets.AGC_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.AGC_CLIENT_SECRET }}\"}")
          echo "::group::Token response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to get access token: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get Upload URL
        id: upload-url
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "https://connect-api.cloud.huawei.com/api/publish/v2/upload-url?appId=${{ secrets.AGC_APP_ID }}&suffix=app&releaseType=1" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "::group::Upload URL response (HTTP $HTTP_CODE)"
          echo "$BODY"
          echo "::endgroup::"
          UPLOAD_URL=$(echo "$BODY" | jq -r '.uploadUrl // .result.uploadUrl // .url // .data.url' 2>/dev/null || echo "")
          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "::error::Failed to get upload URL (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "upload_url=$UPLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "$BODY" > /tmp/upload-url-response.json

      - name: Upload APP file to AppGallery
        id: upload-file
        run: |
          APP_FILE=$(ls /tmp/cortexterminal-*.app | head -1)
          UPLOAD_URL=$(jq -r '.uploadUrl // .result.uploadUrl // .url // .data.url' /tmp/upload-url-response.json)
          AUTH_CODE=$(jq -r '.authCode // .result.authCode // .data.authCode // .data.auth_code' /tmp/upload-url-response.json)

          RESPONSE=$(curl -s -X PUT "$UPLOAD_URL" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}" \
            -F "file=@$APP_FILE" \
            -F "auth_code=$AUTH_CODE" \
            -F "fileCount=1")
          echo "::group::Upload response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          FILE_DEST=$(echo "$RESPONSE" | jq -r '.result.UploadFileRsp.fileInfoList[0].fileDestUlr // .fileContent // .data.fileContent')
          if [ -z "$FILE_DEST" ] || [ "$FILE_DEST" = "null" ]; then
            echo "::error::File upload failed: $RESPONSE"
            exit 1
          fi
          echo "file_dest=$FILE_DEST" >> "$GITHUB_OUTPUT"
          FILE_NAME=$(basename "$APP_FILE")
          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Update App File Info
        run: |
          RESPONSE=$(curl -s -X PUT \
            "https://connect-api.cloud.huawei.com/api/publish/v2/app-file-info?appId=${{ secrets.AGC_APP_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}" \
            -H "Content-Type: application/json" \
            -d "{\"fileType\":5,\"files\":{\"fileName\":\"${{ steps.upload-file.outputs.file_name }}\",\"fileDestUrl\":\"${{ steps.upload-file.outputs.file_dest }}\"}}")
          echo "::group::Update app file info response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          RET=$(echo "$RESPONSE" | jq -r '.ret.code // .code // "unknown"')
          if [ "$RET" != "0" ]; then
            echo "::error::Update app file info failed: $RESPONSE"
            exit 1
          fi

      - name: Wait for package parsing
        run: sleep 120

      - name: Query compile status
        run: |
          for i in $(seq 1 20); do
            RESPONSE=$(curl -s -X GET \
              "https://connect-api.cloud.huawei.com/api/publish/v2/app-compile-status?appId=${{ secrets.AGC_APP_ID }}" \
              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
              -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
            STATUS=$(echo "$RESPONSE" | jq -r '.result // .data // .status // "unknown"')
            echo "Attempt $i: compile status = $STATUS"
            if [ "$STATUS" = "2" ] || [ "$STATUS" = "success" ]; then
              echo "Compile successful"
              exit 0
            fi
            if [ "$STATUS" = "3" ] || [ "$STATUS" = "fail" ]; then
              echo "::error::Compile failed: $RESPONSE"
              exit 1
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for compile"
          exit 1

      - name: Submit for release
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://connect-api.cloud.huawei.com/api/publish/v2/app-submit?appid=${{ secrets.AGC_APP_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "client_id: ${{ secrets.AGC_CLIENT_ID }}")
          echo "::group::Submit response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"
          RET=$(echo "$RESPONSE" | jq -r '.ret.code // .code // "unknown"')
          if [ "$RET" != "0" ]; then
            echo "::error::Submit failed: $RESPONSE"
            exit 1
          fi
          echo "App submitted to AppGallery Connect successfully!"
