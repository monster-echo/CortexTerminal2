name: HarmonyOS Release

on:
  push:
    tags: ['harmony-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '0.0.0'

permissions:
  contents: write

jobs:
  build-harmony:
    name: Build HarmonyOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup OpenHarmony SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        id: sdk
        with:
          version: '6.1'
          cache: true

      - name: Install ohpm
        run: |
          curl -fsSL "https://ohpm.openharmony.cn/ohpm/download/ohpm-cli-5.0.7.zip" -o /tmp/ohpm.zip
          unzip -o -q /tmp/ohpm.zip -d "$HOME/cli-tools"
          echo "$HOME/cli-tools/ohpm/bin" >> "$GITHUB_PATH"

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" == harmony-v* ]]; then
            VERSION="${GITHUB_REF_NAME#harmony-v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BASE_BUILD=$(printf "%d%03d%03d" "$MAJOR" "$MINOR" "$PATCH")
          VERSION_CODE="${BASE_BUILD}${GITHUB_RUN_NUMBER}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode release signing certificates
        id: signing
        env:
          CERT_CER: ${{ secrets.CORTEX_HARMONY_CERT_CER }}
        run: |
          if [ -z "$CERT_CER" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No CORTEX_HARMONY_CERT_CER secret found — using debug signing"
            exit 0
          fi

          SIGN_DIR=$(mktemp -d)
          printf '%s' "$CERT_CER" | base64 -D > "$SIGN_DIR/release.cer"
          printf '%s' "${{ secrets.CORTEX_HARMONY_PROFILE_P7B }}" | base64 -D > "$SIGN_DIR/release.p7b"
          printf '%s' "${{ secrets.CORTEX_HARMONY_KEYSTORE_P12 }}" | base64 -D > "$SIGN_DIR/release.p12"
          echo "dir=$SIGN_DIR" >> "$GITHUB_OUTPUT"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Inject release signing config
        if: steps.signing.outputs.enabled == 'true'
        env:
          SIGN_DIR: ${{ steps.signing.outputs.dir }}
          KEY_ALIAS: ${{ secrets.CORTEX_HARMONY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CORTEX_HARMONY_KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.CORTEX_HARMONY_KEYSTORE_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import re, os

          sign_dir = os.environ['SIGN_DIR']
          key_alias = os.environ['KEY_ALIAS']
          key_pwd = os.environ['KEY_PASSWORD']
          ks_pwd = os.environ['KEYSTORE_PASSWORD']

          with open('src/Harmony/build-profile.json5', 'r') as f:
              content = f.read()

          new_signing = f'''  "signingConfigs": [
            {{
              "name": "default",
              "type": "HarmonyOS",
              "material": {{
                "certpath": "{sign_dir}/release.cer",
                "keyAlias": "{key_alias}",
                "keyPassword": "{key_pwd}",
                "profile": "{sign_dir}/release.p7b",
                "signAlg": "SHA256withECDSA",
                "storeFile": "{sign_dir}/release.p12",
                "storePassword": "{ks_pwd}"
              }}
            }}
          ],'''

          content = re.sub(
              r'"signingConfigs"\s*:\s*\[.*?\],',
              new_signing,
              content,
              count=1,
              flags=re.DOTALL,
          )

          with open('src/Harmony/build-profile.json5', 'w') as f:
              f.write(content)
          PYEOF

      - name: Generate build files
        run: |
          cd src/Harmony

          SDK_PATH="${{ steps.sdk.outputs.ohos-base-sdk-home }}"

          cat > local.properties <<EOF
          sdk.dir=$SDK_PATH
          nodejs.dir=$(dirname $(which node))
          ohos.sdk.dir=$SDK_PATH
          hwsdk.dir=$SDK_PATH
          EOF

          cat > hvigorfile.ts <<'EOF'
          import { appTasks } from '@ohos/hvigor-ohos-plugin';
          export default {
              system: appTasks,
              plugins:[]
          }
          EOF

          cat > product/entry/hvigorfile.ts <<'EOF'
          import { hapTasks } from '@ohos/hvigor-ohos-plugin';
          export default {
              system: hapTasks,
              plugins:[]
          }
          EOF

          for dir in common/core common/signalr common/routermodule \
                     feature/auth feature/terminal feature/worker \
                     feature/settings feature/session; do
            cat > "$dir/hvigorfile.ts" <<'EOF'
          import { harTasks } from '@ohos/hvigor-ohos-plugin';
          export default {
              system: harTasks,
              plugins:[]
          }
          EOF
          done

      - name: Update version in app.json5
        run: |
          cd src/Harmony
          sed -i '' \
            -e "s/\"versionCode\": [0-9]*/\"versionCode\": ${{ steps.version.outputs.version_code }}/" \
            -e "s/\"versionName\": \"[^\"]*\"/\"versionName\": \"${{ steps.version.outputs.version }}\"/" \
            AppScope/app.json5

      - name: Install dependencies & build
        run: |
          cd src/Harmony

          ohpm install --all

          # Create hvigorw wrapper
          cat > hvigorw <<'WRAPPER'
          #!/bin/sh
          set -e
          HVIGOR_DIR="$(cd "$(dirname "$0")" && pwd)"
          NODE_PATH="$HVIGOR_DIR/oh_modules" exec node "$HVIGOR_DIR/hvigor/hvigor-wrapper.js" "$@"
          WRAPPER
          chmod +x hvigorw

          # Create hvigor wrapper entry point
          cat > hvigor/hvigor-wrapper.js <<'ENTRY'
          const path = require('path');
          const projectRoot = path.join(__dirname, '..');
          const hvigorPkg = path.join(projectRoot, 'oh_modules', '@ohos', 'hvigor');
          try {
            const hvigor = require(hvigorPkg);
            if (hvigor && typeof hvigor.run === 'function') {
              hvigor.run();
            } else {
              const entry = path.join(hvigorPkg, 'bin', 'hvigor.js');
              require(entry);
            }
          } catch (e) {
            console.error('Failed to load hvigor:', e.message);
            console.error('Make sure @ohos/hvigor is installed in oh_modules/');
            process.exit(1);
          }
          ENTRY

          ./hvigorw assembleApp --mode module -p product=default -p buildMode=release --no-daemon

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src/Harmony/product/entry/build/default/outputs/default/*-signed.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup signing files
        if: always() && steps.signing.outputs.enabled == 'true'
        run: rm -rf "${{ steps.signing.outputs.dir }}"
