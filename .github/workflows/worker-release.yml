name: Worker Platform Release

on:
  push:
    tags: ['worker-v*']

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Worker (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            archive: tar.gz
          - rid: osx-arm64
            os: macos-latest
            archive: tar.gz
          - rid: win-x64
            os: windows-latest
            archive: zip
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/worker-v}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Worker
        run: |
          dotnet publish src/Worker/CortexTerminal.Worker/CortexTerminal.Worker.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            --output ./publish/worker-${{ matrix.rid }}
        shell: pwsh

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          find ./publish/worker-${{ matrix.rid }} -name '*.pdb' -delete
          case "${{ matrix.rid }}" in
            linux-*) cp deploy/cortexterm-worker.service ./publish/worker-${{ matrix.rid }}/ ;;
            osx-*)   cp deploy/com.cortexterm.worker.plist ./publish/worker-${{ matrix.rid }}/ ;;
          esac
          tar -czf cortex-${{ matrix.rid }}.tar.gz -C ./publish/worker-${{ matrix.rid }} .

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Get-ChildItem -Path ./publish/worker-${{ matrix.rid }} -Filter *.pdb | Remove-Item
          Compress-Archive `
            -Path ./publish/worker-${{ matrix.rid }}/* `
            -DestinationPath cortex-${{ matrix.rid }}.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cortex-${{ matrix.rid }}.tar.gz
            cortex-${{ matrix.rid }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
