<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CortexTerminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #terminal-container {
      width: 100%;
      height: 100%;
      background-color: #121414;
      overflow: hidden;
    }
    /* Prevent text selection on long press */
    * {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    /* Allow text selection inside terminal */
    .xterm {
      user-select: text;
      -webkit-user-select: text;
    }
    /* Force WebGL canvas onto its own GPU compositing layer.
       ArkWeb API20 has a known regression where WebGL canvas renders black
       despite all GL calls succeeding (context, shaders, drawArrays all OK).
       translateZ(0) lifts the canvas out of the software compositor path
       that has the bug. Must be on `canvas`, never on `.xterm-rows` (would
       break DOM renderer's internal measurement). */
    .xterm-screen canvas {
      transform: translateZ(0);
      will-change: transform;
    }
  </style>
  <link rel="stylesheet" href="xterm.css" />
</head>
<body>
  <div id="terminal-container"></div>

  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script src="xterm-addon-webgl.js"></script>

  <script>
    // === Globals ===
    let term = null;
    let fitAddon = null;

    // === WebMessagePort 通信 ===
    var h5Port;
    window.addEventListener('message', function(event) {
      if (event.data === '__init_port__') {
        if (event.ports[0]) {
          h5Port = event.ports[0];
          console.log('h5Port initialized');
        }
      }
    });

    // === Bridge functions (called from ArkTS via runJavaScript) ===

    /**
     * Initialize xterm.js terminal instance.
     * @param {number} cols - Initial columns (default 80)
     * @param {number} rows - Initial rows (default 24)
     */
    function initTerminal(cols, rows) {
      if (term) {
        term.dispose();
      }

      cols = cols || 80;
      rows = rows || 24;

      term = new Terminal({
        cols: cols,
        rows: rows,
        cursorBlink: true,
        cursorStyle: 'bar',
        fontSize: 14,
        fontFamily: 'monospace',
        theme: {
          background: '#121414',
          foreground: '#e3e2e2',
          cursor: '#9fcaff',
          cursorAccent: '#121414',
          selectionBackground: '#3a95e8',
          black: '#121414',
          red: '#ffb4ab',
          green: '#a2d489',
          yellow: '#ffd180',
          blue: '#9fcaff',
          magenta: '#f5a8d0',
          cyan: '#80cbc4',
          white: '#e3e2e2',
          brightBlack: '#8e9192',
          brightRed: '#ffb4ab',
          brightGreen: '#a2d489',
          brightYellow: '#ffd180',
          brightBlue: '#9fcaff',
          brightMagenta: '#f5a8d0',
          brightCyan: '#80cbc4',
          brightWhite: '#e3e2e2'
        },
        scrollback: 10000,
        allowProposedApi: true,
        allowTransparency: false
      });

      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);

      const container = document.getElementById('terminal-container');
      term.open(container);

      // Register resize handler BEFORE fit() so the initial resize event is captured
      term.onResize(function(size) {
        if (h5Port) {
          h5Port.postMessage(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
        }
      });

      // Fit immediately to ensure correct size before any output arrives
      try {
        fitAddon.fit();
      } catch(e) {
        console.warn('fitAddon.fit() failed:', e);
      }

      // Forward user input to ArkTS via WebMessagePort (MUST register before WebGL,
      // so a renderer init failure can never break input — VS Code applies the same pattern)
      term.onData(function(data) {
        if (h5Port) {
          h5Port.postMessage(JSON.stringify({ type: 'input', data: data }));
        } else {
          console.error('h5Port is NULL, input dropped: ' + JSON.stringify(data));
          document.title = 'h5Port NULL!';
        }
      });

      // WebGL renderer is mandatory. No DOM renderer fallback.
      // Addon itself throws "WebGL2 not supported" if context unavailable —
      // surfacing that error visibly so the root cause is obvious.

      // === Monkey-patch mainDocument to point at real document ===
      // xterm 6.0's CoreBrowserService.mainDocument on ArkWeb may produce a
      // canvas whose getContext('webgl2') returns null even though the real
      // document works. Force it to the real document so the addon can create
      // a working WebGL context.
      try {
        var core = term._core;
        if (core && core._coreBrowserService) {
          core._coreBrowserService.mainDocument = document;
        }
      } catch(e) {
        console.error('[XtermWebview] mainDocument patch failed: ' + e.message);
      }

      var webglAddon = new WebglAddon.WebglAddon();
      term.loadAddon(webglAddon);

      webglAddon.onContextLoss(function() {
        console.error('[XtermWebview] WebGL context lost');
        document.title = 'FATAL: WebGL context lost';
      });
      console.info('[XtermWebview] WebGL renderer enabled');

      // === Custom touch scroll (ported from MAUI useTouchScroll.ts) ===
      // xterm 6.0 WebGL doesn't support touch scroll natively — SmoothScrollableElement
      // only listens for wheel events, and the page is overflow:hidden so the browser
      // doesn't synthesize wheel from touch. MAUI solved this in useTouchScroll.ts;
      // this is a 1:1 native-JS port.
      //   - long press 500ms → enter selection mode (let xterm handle the touch)
      //   - move > 10px before long press fires → cancel long press, scroll mode
      //   - touchmove: passive:false + preventDefault, accumulate dy, scrollLines(±)
      //   - touchend: if velocity > 0.5, requestAnimationFrame inertia loop (0.95 decay)
      (function setupTouchScroll() {
        var PIXELS_PER_LINE = 17;
        var FRICTION = 0.95;
        var MIN_VELOCITY = 0.5;
        var LONG_PRESS_MS = 500;
        var MOVE_THRESHOLD = 10;

        var st = null; // { accumulated, lastY, lastTime, rafId, velocity, startY, longPressTimer, selecting }

        function clearLongPress(s) {
          if (s.longPressTimer) {
            clearTimeout(s.longPressTimer);
            s.longPressTimer = null;
          }
        }

        container.addEventListener('touchstart', function(e) {
          if (e.touches.length !== 1) return;
          if (st && st.rafId) cancelAnimationFrame(st.rafId);

          var s = {
            accumulated: 0,
            lastY: e.touches[0].clientY,
            lastTime: Date.now(),
            rafId: 0,
            velocity: 0,
            startY: e.touches[0].clientY,
            longPressTimer: null,
            selecting: false
          };

          // Long-press timer: after 500ms of no movement, switch to selection mode.
          // Focus the xterm helper textarea and dispatch a synthetic touchstart on
          // the real target under the finger so xterm's selection picks it up.
          s.longPressTimer = setTimeout(function() {
            s.selecting = true;
            var textarea = container.querySelector('.xterm-helper-textarea');
            if (textarea) textarea.focus();
            var touch = e.touches[0];
            var target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target) {
              var syntheticTouch = new Touch({
                identifier: touch.identifier,
                target: target,
                clientX: touch.clientX,
                clientY: touch.clientY,
                pageX: touch.pageX,
                pageY: touch.pageY,
                screenX: touch.screenX,
                screenY: touch.screenY
              });
              target.dispatchEvent(new TouchEvent('touchstart', {
                touches: [syntheticTouch],
                targetTouches: [syntheticTouch],
                bubbles: true,
                cancelable: true
              }));
            }
          }, LONG_PRESS_MS);

          st = s;
        }, { passive: true });

        container.addEventListener('touchmove', function(e) {
          if (!st || e.touches.length !== 1) return;
          var s = st;

          var currentY = e.touches[0].clientY;
          var totalDelta = Math.abs(currentY - s.startY);

          // Movement beyond threshold before long-press fires → cancel selection intent
          if (!s.selecting && totalDelta > MOVE_THRESHOLD) {
            clearLongPress(s);
          }

          // In selection mode, let xterm handle the touch
          if (s.selecting) return;

          e.preventDefault();

          var deltaY = s.lastY - currentY;
          var now = Date.now();
          var dt = now - s.lastTime;
          if (dt > 0) s.velocity = deltaY / dt;

          s.lastY = currentY;
          s.lastTime = now;
          s.accumulated += deltaY;

          var lines = Math.trunc(s.accumulated / PIXELS_PER_LINE);
          if (lines !== 0) {
            term.scrollLines(lines);
            s.accumulated -= lines * PIXELS_PER_LINE;
          }
        }, { passive: false });

        container.addEventListener('touchend', function() {
          if (!st) return;
          var s = st;
          clearLongPress(s);

          if (s.selecting) {
            st = null;
            return;
          }

          if (Math.abs(s.velocity) > MIN_VELOCITY) {
            var inertiaScroll = function() {
              if (!st) return;
              var cur = st;
              cur.velocity *= FRICTION;
              if (Math.abs(cur.velocity) < MIN_VELOCITY * 0.1) {
                st = null;
                return;
              }
              var delta = cur.velocity * 16;
              cur.accumulated += delta;
              var lines = Math.trunc(cur.accumulated / PIXELS_PER_LINE);
              if (lines !== 0) {
                term.scrollLines(lines);
                cur.accumulated -= lines * PIXELS_PER_LINE;
              }
              cur.rafId = requestAnimationFrame(inertiaScroll);
            };
            s.rafId = requestAnimationFrame(inertiaScroll);
          } else {
            st = null;
          }
        }, { passive: true });

        console.info('[XtermWebview] touch scroll installed (ported from MAUI)');
      })();

      console.log('Terminal initialized: ' + cols + 'x' + rows);
    }

    /**
     * Write raw string data to the terminal.
     * @param {string} data - Terminal escape sequence data
     */
    function writeOutput(data) {
      if (term) {
        term.write(data);
      }
    }

    /**
     * Decode base64 to bytes and write to terminal.
     * Shared by single-frame and batched write paths.
     * Normalizes bare \n to \r\n to prevent the staircase effect.
     */
    function decodeAndWrite(b64) {
      var binaryStr = atob(b64);
      var bytes = new Uint8Array(binaryStr.length);
      for (var i = 0; i < binaryStr.length; i++) {
        bytes[i] = binaryStr.charCodeAt(i) & 0xFF;
      }
      var text = new TextDecoder().decode(bytes);
      if (text.indexOf('\n') !== -1) {
        text = text.replace(/(?<!\r)\n/g, '\r\n');
        bytes = new TextEncoder().encode(text);
      }
      term.write(bytes);
    }

    /**
     * Write a single base64-encoded frame to the terminal.
     * @param {string} base64Data - Base64 encoded output data
     */
    function writeBase64Output(base64Data) {
      if (term && base64Data) {
        decodeAndWrite(base64Data);
      }
    }

    /**
     * Write multiple base64-encoded frames in one JS bridge call.
     * Frames are joined with '|' (base64 charset A-Za-z0-9+/= does not include '|').
     * @param {string} packed - '|' separated base64 frames
     */
    function writeBatchedOutput(packed) {
      if (!term || !packed) return;
      var frames = packed.split('|');
      for (var i = 0; i < frames.length; i++) {
        decodeAndWrite(frames[i]);
      }
    }

    /**
     * Resize the terminal to new dimensions.
     * @param {number} cols
     * @param {number} rows
     */
    function resizeTerminal(cols, rows) {
      if (term) {
        term.resize(cols, rows);
      }
    }

    /**
     * Fit the terminal to its container.
     */
    function fitTerminal() {
      if (fitAddon) {
        try {
          fitAddon.fit();
        } catch(e) {
          console.warn('fitAddon.fit() failed:', e);
        }
      }
    }

    /**
     * Clear the terminal screen.
     */
    function clearTerminal() {
      if (term) {
        term.clear();
      }
    }

    /**
     * Reset the terminal completely.
     */
    function resetTerminal() {
      if (term) {
        term.reset();
      }
    }

    /**
     * Get current terminal selection.
     * @returns {string} Selected text or empty string
     */
    function getSelection() {
      if (term) {
        return term.getSelection() || '';
      }
      return '';
    }

    /**
     * Clear terminal selection.
     */
    function clearSelection() {
      if (term) {
        term.clearSelection();
      }
    }

    /**
     * Get current terminal dimensions.
     * @returns {string} JSON with cols and rows
     */
    function getTerminalSize() {
      if (term) {
        return JSON.stringify({ cols: term.cols, rows: term.rows });
      }
      return JSON.stringify({ cols: 80, rows: 24 });
    }

    // === Window resize handling ===
    window.addEventListener('resize', function() {
      if (fitAddon) {
        try {
          fitAddon.fit();
        } catch(e) {
          // Ignore fit errors during resize
        }
      }
    });
  </script>
</body>
</html>
