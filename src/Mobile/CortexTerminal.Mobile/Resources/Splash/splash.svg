<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="98" y1="233" x2="201" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3BA5F9"/>
      <stop offset="1" stop-color="#38E6FF"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="257" y1="360" x2="360" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9333EA"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-opacity="0.6" result="flood"/>
      <feComposite in="flood" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
    <filter id="ambientGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
    </filter>
  </defs>
  <!-- Ambient glow layer -->
  <g opacity="0.4" filter="url(#ambientGlow)">
    <path d="M 98 225 V 139 C 98 117 117 98 139 98 H 225" stroke="url(#blueGrad)" stroke-width="36" stroke-linecap="round"/>
    <path d="M 358 234 V 320 C 358 342 339 360 317 360 H 234" stroke="url(#purpleGrad)" stroke-width="36" stroke-linecap="round"/>
    <path d="M 197 172 L 262 228 L 197 284" stroke="#E0F2FE" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Neon glow layer -->
  <g filter="url(#neonGlow)">
    <path d="M 98 225 V 139 C 98 117 117 98 139 98 H 225" stroke="url(#blueGrad)" stroke-width="29" stroke-linecap="round"/>
    <path d="M 358 234 V 320 C 358 342 339 360 317 360 H 234" stroke="url(#purpleGrad)" stroke-width="29" stroke-linecap="round"/>
    <path d="M 197 172 L 262 228 L 197 284" stroke="#E0F2FE" stroke-width="31" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Core sharp lines -->
  <g>
    <path d="M 98 225 V 139 C 98 117 117 98 139 98 H 225" stroke="url(#blueGrad)" stroke-width="27" stroke-linecap="round"/>
    <path d="M 358 234 V 320 C 358 342 339 360 317 360 H 234" stroke="url(#purpleGrad)" stroke-width="27" stroke-linecap="round"/>
    <path d="M 197 172 L 262 228 L 197 284" stroke="#FFFFFF" stroke-width="29" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
