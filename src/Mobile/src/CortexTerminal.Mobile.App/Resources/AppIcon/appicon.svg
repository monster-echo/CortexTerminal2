<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="76" y1="52" x2="436" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C0C10" />
      <stop offset="1" stop-color="#08080A" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="110" y1="251" x2="225" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3BA5F9" />
      <stop offset="1" stop-color="#38E6FF" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="287" y1="402" x2="402" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9333EA" />
      <stop offset="1" stop-color="#C084FC" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feFlood flood-opacity="0.6" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="coloredBlur" />
      </feMerge>
    </filter>
    <filter id="ambientGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20" result="blur" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <!-- Ambient glow layer -->
  <g opacity="0.4" filter="url(#ambientGlow)">
    <path d="M 110 251 V 155 C 110 130.2 130.2 110 155 110 H 251" stroke="url(#blueGrad)" stroke-width="40" stroke-linecap="round" />
    <path d="M 402 261 V 357 C 402 381.8 381.8 402 357 402 H 261" stroke="url(#purpleGrad)" stroke-width="40" stroke-linecap="round" />
    <path d="M 220 192 L 292 256 L 220 320" stroke="#E0F2FE" stroke-width="43" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <!-- Neon glow layer -->
  <g filter="url(#neonGlow)">
    <path d="M 110 251 V 155 C 110 130.2 130.2 110 155 110 H 251" stroke="url(#blueGrad)" stroke-width="33" stroke-linecap="round" />
    <path d="M 402 261 V 357 C 402 381.8 381.8 402 357 402 H 261" stroke="url(#purpleGrad)" stroke-width="33" stroke-linecap="round" />
    <path d="M 220 192 L 292 256 L 220 320" stroke="#E0F2FE" stroke-width="35" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <!-- Core lines -->
  <g>
    <path d="M 110 251 V 155 C 110 130.2 130.2 110 155 110 H 251" stroke="url(#blueGrad)" stroke-width="30" stroke-linecap="round" />
    <path d="M 402 261 V 357 C 402 381.8 381.8 402 357 402 H 261" stroke="url(#purpleGrad)" stroke-width="30" stroke-linecap="round" />
    <path d="M 220 192 L 292 256 L 220 320" stroke="#FFFFFF" stroke-width="33" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
